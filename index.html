<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorry Papunnichechi</title>

<style>

body{
  margin:0;
  font-family: Arial, sans-serif;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.container{
  background:white;
  padding:35px;
  border-radius:20px;
  box-shadow:0 15px 35px rgba(0,0,0,0.2);
  max-width:360px;
}

h1{
  color:#ff4b6e;
}

button{
  padding:14px 26px;
  margin:10px;
  border:none;
  border-radius:12px;
  font-size:18px;
  cursor:pointer;
}

#yesBtn{
  background:#28a745;
  color:white;
}

#noBtn{
  background:#dc3545;
  color:white;
  position:relative;
}

#message{
  display:none;
  margin-top:20px;
  color:#ff4b6e;
  font-size:18px;
}

</style>
</head>

<body>

<div class="container">

<h1>Sorry Papunnichechi</h1>

<p>
Sorry for raising my voice.<br>
I won’t repeat this again chechi 🙏🥺
</p>

<p>Will you please forgive me?</p>

<button id="yesBtn">Yes ❤️</button>
<button id="noBtn">No 😒</button>

<div id="message">
<p>Thank you Papunnichechi ❤️</p>
<p>I promise I will be more careful with my words.</p>
<p>You mean a lot to me 🙏</p>
</div>

</div>

<script>

const noBtn=document.getElementById("noBtn");
const yesBtn=document.getElementById("yesBtn");
const message=document.getElementById("message");

function moveButton(){
  const x=Math.random()*250-125;
  const y=Math.random()*250-125;
  noBtn.style.transform=`translate(${x}px,${y}px)`;
}

noBtn.addEventListener("mouseover",moveButton);

noBtn.addEventListener("touchstart",function(e){
  e.preventDefault();
  moveButton();
});

yesBtn.addEventListener("click",()=>{
  message.style.display="block";
});

</script>

</body>
</html>
